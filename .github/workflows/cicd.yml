name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
    paths:
    - 'app/**'
    - 'requirements.txt'
    - 'Dockerfile'
    - '.github/workflows/**'
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Security scanning
  security-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
    - uses: actions/checkout@v3
    
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'
    
    - name: Upload Trivy results to GitHub Security
      uses: github/codeql-action/upload-sarif@v2
      with:
        sarif_file: 'trivy-results.sarif'

  # Code quality
  code-quality:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install pylint flake8 black isort
    
    - name: Run linting
      run: |
        flake8 app/ --count --select=E9,F63,F7,F82 --show-source --statistics
        pylint app/ --exit-zero
    
    - name: Check code formatting
      run: |
        black --check app/ || true
        isort --check-only app/ || true

  # Build and push Docker image
  build-push:
    needs: [security-scan, code-quality]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Log in to Container Registry
      uses: docker/login-action@v2
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v4
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=sha
    
    - name: Build and push Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
        cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max

  # Deployment to staging
  deploy-staging:
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    needs: build-push
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Deploy to staging cluster
      env:
        KUBECONFIG_CONTENT: ${{ secrets.KUBECONFIG_STAGING }}
      run: |
        echo "$KUBECONFIG_CONTENT" | base64 -d > ~/.kube/config
        kubectl set image deployment/k8s-incident-rca app=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} --record
        kubectl rollout status deployment/k8s-incident-rca --timeout=5m

  # Deployment to production
  deploy-production:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build-push
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://k8s-rca.example.com
    steps:
    - uses: actions/checkout@v3
    
    - name: Deploy to production cluster
      env:
        KUBECONFIG_CONTENT: ${{ secrets.KUBECONFIG_PRODUCTION }}
      run: |
        echo "$KUBECONFIG_CONTENT" | base64 -d > ~/.kube/config
        kubectl set image deployment/k8s-incident-rca app=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} --record
        kubectl rollout status deployment/k8s-incident-rca --timeout=5m
    
    - name: Smoke tests
      run: |
        sleep 30
        curl -f http://k8s-incident-rca/health || exit 1

  # Notification
  notify:
    if: always()
    needs: [security-scan, code-quality, build-push]
    runs-on: ubuntu-latest
    steps:
    - name: Send Slack notification
      uses: 8398a7/action-slack@v3
      if: always()
      with:
        status: ${{ job.status }}
        text: 'CI/CD Pipeline ${{ job.status }}'
        webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        fields: repo,message,commit,author
